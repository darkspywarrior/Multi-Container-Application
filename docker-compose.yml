
services:

  api:
    build: .
    container_name: todo-devops-project-api-1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017/todos
    depends_on:
      - mongo
    volumes:
      - .:/app
    networks:
      - app_net


  fingerprint-service:
    build: ./fingerprint-service
    container_name: todo-devops-project-fingerprint-service-1
    restart: unless-stopped

    ports:
      - "8082:8082"

    depends_on:
      - mongo
      - minio

    volumes:
      - ./fingerprint-service/wallet:/app/wallet
      - ./fingerprint-service/fabric-config:/app/fabric-config

    environment:
      FABRIC_CONNECTION_PROFILE: /app/fabric-config/connection-org1.json
      FABRIC_WALLET_PATH: /app/wallet
      FABRIC_CHANNEL_NAME: mychannel
      FABRIC_CONTRACT_NAME: fingerprint

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: fingerprints

    networks:
      - app_net
      - fabric_test


  mongo:
    image: mongo:latest
    container_name: todo-devops-project-mongo-1
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - app_net


  minio:
    image: minio/minio:latest
    container_name: todo-devops-project-minio-1
    restart: unless-stopped

    command: minio server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    volumes:
      - minio-data:/data

    networks:
      - app_net


  nginx:
    image: nginx:latest
    container_name: todo-devops-project-nginx-1
    restart: unless-stopped

    depends_on:
      - api
      - fingerprint-service

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    networks:
      - app_net


  prometheus:
    image: prom/prometheus:latest
    container_name: todo-devops-project-prometheus-1
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
      - app_net


  grafana:
    image: grafana/grafana:latest
    container_name: todo-devops-project-grafana-1
    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    networks:
      - app_net


networks:
  app_net:
    driver: bridge

  fabric_test:
    external: true


volumes:
  mongo-data:
  minio-data: