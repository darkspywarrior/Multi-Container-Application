global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'fingerprint-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['fingerprint-service:8082']

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']